name: Content Scraper Workflow

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [source]

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source branch (code) into ./code
        uses: actions/checkout@v4
        with:
          ref: source
          path: code

      - name: Checkout data branch (main) into ./data
        uses: actions/checkout@v4
        with:
          ref: data
          path: data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: code/src/requirements.txt

      - name: Install dependencies
        run: |
          python -m venv venv
          ./venv/bin/pip install --upgrade pip
          if [ -f ./code/src/requirements.txt ]; then ./venv/bin/pip install -r ./code/src/requirements.txt; fi

      - name: Run Scraper
        # OUTPUT_DIR=data makes the scraper write state.json + per-source
        # folders into the `main` checkout, which we commit & push below.
        env:
          OUTPUT_DIR: data
          DISCORD_WEBHOOK_UNI: ${{ secrets.DISCORD_WEBHOOK_UNI }}
        run: ./venv/bin/python code/src/main.py

      - name: Commit and Push changes to main
        working-directory: data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git status

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Database update $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes detected, skipping commit."
          fi
