name: Content Scraper Workflow

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-scraping]
  push:
    branches: [source]

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source branch (code) into ./code
        uses: actions/checkout@v4
        with:
          ref: source
          path: code

      - name: Checkout data branch into ./data
        uses: actions/checkout@v4
        with:
          ref: data
          path: data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: code/requirements.txt

      - name: Install dependencies
        run: |
          python -m venv venv
          ./venv/bin/pip install --upgrade pip
          if [ -f ./code/requirements.txt ]; then ./venv/bin/pip install -r ./code/requirements.txt; fi

      - name: Run Scraper
        env:
          OUTPUT_DIR: data
          DIFF_FILE: ./diff.json
        run: ./venv/bin/python code/main.py --scrape

      - name: Commit and Push changes to data
        working-directory: data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git status

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Database update $(date +'%Y-%m-%d')"
            git push
            echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          else
            echo "No changes detected, skipping commit."
          fi

      - name: Notify Discord
        if: env.COMMIT_SHA != ''
        env:
          DIFF_FILE: ./diff.json
          DISCORD_WEBHOOK_UNI: ${{ secrets.DISCORD_WEBHOOK_UNI }}
        run: ./venv/bin/python code/main.py --notify --commit-sha ${{ env.COMMIT_SHA }}
